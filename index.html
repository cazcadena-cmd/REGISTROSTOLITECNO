<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comprobante de Registro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  background:#121212;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
  padding:20px;
}
.contenedor {
  max-width:600px;
  margin:auto;
}
.card {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}
img {
  width:100%;
  max-width:400px;
  border-radius:10px;
  margin:10px 0;
  border:2px solid #fcbb18;
}
h2 { color:#fcbb18;
   font-size:10px;
   font-weight:500;
   line-height:1.4
}

</style>
</head>
<body>

<div class="contenedor" id="contenido">
<h2>Cargando información...</h2>
</div>

<script>

// 🔥 MISMA CONFIGURACIÓN QUE TU FORMULARIO
firebase.initializeApp({
  apiKey: "TU_API_KEY",
  authDomain: "imagen-compartida.firebaseapp.com",
  databaseURL: "https://imagen-compartida-default-rtdb.firebaseio.com",
  projectId: "imagen-compartida"
});

const db = firebase.database();

// Obtener ID del QR
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
  document.getElementById("contenido").innerHTML =
  "<h2 style='color:red'>ID no válido</h2>";
}else{

  db.ref("registros/" + id).once("value").then(snapshot => {

    const data = snapshot.val();

    if(!data){
      document.getElementById("contenido").innerHTML =
      "<h2 style='color:red'>Registro no encontrado</h2>";
      return;
    }

    let html = `
      <h2>Si ves este mensaje en TOLITECNO, significa que tu conductor fue verificado y aprobó nuestros filtros de seguridad.</h2>
      <div class="card">
        <p><strong>Nombre:</strong> ${data.nombre}</p>
        <p><strong>Matrícula:</strong> ${data.matricula}</p>
        <p><strong>Teléfono:</strong> ${data.telefono}</p>
      </div>
      <h2>Evidencias</h2>
    `;

    if(data.imagenes){
  data.imagenes.forEach(img=>{

    // Solo mostrar selfie y auto
    if(
  img.tipo === "Selfie" ||
  img.tipo === "Foto del vehículo"
){

      html += `
        <div class="card">
          <p><strong>${img.tipo.toUpperCase()}</strong></p>
          <img src="${img.dataUrl}">
        </div>
      `;
    }

  });
}

    document.getElementById("contenido").innerHTML = html;

  });

}

</script>

</body>
</html>
