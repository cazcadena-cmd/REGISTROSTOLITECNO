<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verificación de Conductor | TOLITECNO</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #fcbb18;
            --bg: #121212;
            --card-bg: #1e1e1e;
        }
        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .contenedor {
            max-width: 500px;
            margin: auto;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #333;
        }
        h2 { 
            color: var(--primary);
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-label { color: #888; font-size: 0.9em; margin-bottom: 2px; }
        .info-value { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; }
        .error { color: #ff5252; font-weight: bold; }

        /* NUEVOS ESTILOS PARA LOS BOTONES */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-sizing: border-box;
        }
        .btn-share {
            background: var(--primary);
            color: #fff;
        }
        .btn-panic {
            background: #d32f2f;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }
        @keyframes vibrate {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            50% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
            100% { transform: rotate(0deg); }
        }
        .bell-icon {
            animation: vibrate 0.3s infinite;
            width: 20px;
            height: 20px;
            fill: white;
        }
    </style>
</head>
<body>

<div class="contenedor" id="contenido">
    <h2 id="status">🔍 Verificando credenciales...</h2>
</div>

<script>
    // CONFIGURACIÓN (Asegúrate de poner tu API KEY real aquí)
    const firebaseConfig = {
        apiKey: "TU_API_KEY", 
        authDomain: "imagen-compartida.firebaseapp.com",
        databaseURL: "https://imagen-compartida-default-rtdb.firebaseio.com",
        projectId: "imagen-compartida"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    // Variable global para almacenar las imágenes válidas y compartirlas
    window.imagenesParaCompartir = [];

    const renderError = (msg) => {
        document.getElementById("contenido").innerHTML = `<div class="card"><h2 class="error">⚠️ ${msg}</h2></div>`;
    };

    if(!id){
        renderError("El enlace de verificación no es válido o ha expirado.");
    } else {
        db.ref("registros/" + id).once("value")
        .then(snapshot => {
            const data = snapshot.val();

            if(!data){
                renderError("Conductor no encontrado en nuestra base de datos.");
                return;
            }

            let html = `
                <h2>Verificación Exitosa</h2>
                <p style="font-size: 0.9em; margin-bottom: 20px;">Este conductor ha pasado los filtros de seguridad de <b>TOLITECNO</b>.</p>
                
                <div class="card">
                    <div class="info-label">Nombre completo</div>
                    <div class="info-value">${data.nombre}</div>
                    
                    <div class="info-label">Matrícula del vehículo</div>
                    <div class="info-value">${data.matricula}</div>
                    
                    <div class="info-label">Teléfono de contacto</div>
                    <div class="info-value">${data.telefono}</div>
                </div>
                
                <h2>Evidencias Fotográficas</h2>
            `;

            if(data.imagenes){
                data.imagenes.forEach(img => {
                    if(img.tipo === "La mejor Selfie" || img.tipo === "Foto del vehículo"){
                        // Guardamos las imágenes para la función de compartir
                        window.imagenesParaCompartir.push(img);

                        html += `
                            <div class="card" style="text-align: center;">
                                <div class="info-label">${img.tipo.toUpperCase()}</div>
                                <img src="${img.dataUrl}" alt="${img.tipo}">
                            </div>
                        `;
                    }
                });
            }

            // AÑADIR LOS BOTONES AL FINAL DEL HTML
            html += `
                <button class="btn btn-share" onclick="compartirUbicacion(false)">Compartir ubicación en tiempo real</button>
                
                <button class="btn btn-panic" onclick="compartirUbicacion(true)">
                    <svg class="bell-icon" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
                        <path d="M224 0c-17.7 0-32 14.3-32 32V51.2C119 66 64 130.6 64 208v114.3c0 45.3-17.9 88.9-50 120.9-5.7 5.7-9 13.5-9 21.6 0 17 13.8 30.7 30.7 30.7H412.3c17 0 30.7-13.8 30.7-30.7 0-8.1-3.2-15.9-9-21.6C401.9 411.2 384 367.6 384 322.3V208c0-77.4-55-142-128-156.8V32c0-17.7-14.3-32-32-32zm0 512c26.5 0 48-21.5 48-48H176c0 26.5 21.5 48 48 48z"/>
                    </svg>
                    Solo si te sientes en peligro presiona este botón
                </button>
            `;

            document.getElementById("contenido").innerHTML = html;
        })
        .catch(error => {
            console.error(error);
            renderError("Error de conexión. Inténtalo de nuevo.");
        });
    }

    // FUNCIONES PARA COMPARTIR UBICACIÓN E IMÁGENES
    
    // Función auxiliar para convertir Base64 a un objeto File (necesario para Web Share API)
    async function base64ToFile(dataUrl, filename) {
        const res = await fetch(dataUrl);
        const blob = await res.blob();
        return new File([blob], filename, { type: blob.type });
    }

    async function compartirUbicacion(esPanico) {
        if (!navigator.geolocation) {
            alert("Tu navegador no soporta geolocalización.");
            return;
        }

        // Mostrar un pequeño feedback de que está cargando
        const btnTextoOriginal = esPanico ? "Solo si te sientes en peligro..." : "Compartir ubicación en tiempo real";
        event.target.innerText = "Obteniendo ubicación...";

        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const linkMapa = `https://www.google.com/maps?q=${lat},${lng}`;
            
            // Los asteriscos (*) hacen que el texto se vea en negrita en WhatsApp
            const textoMensaje = esPanico 
                ? `*AYUDA! ME SIENTO EN PELIGRO...*\nEstoy aquí: ${linkMapa}`
                : `Por seguridad comparto mi ubicación contigo en un vehículo de la app TOLITECNO con perfil verificado.\nMi ubicación actual: ${linkMapa}`;

            let archivosParaCompartir = [];

            // Convertir las imágenes guardadas a archivos compartibles
            if (window.imagenesParaCompartir.length > 0) {
                for (let i = 0; i < window.imagenesParaCompartir.length; i++) {
                    const imgFile = await base64ToFile(window.imagenesParaCompartir[i].dataUrl, `evidencia_${i}.jpg`);
                    archivosParaCompartir.push(imgFile);
                }
            }

            const datosACompartir = {
                title: 'Ubicación TOLITECNO',
                text: textoMensaje
            };

            // Solo añadimos los archivos si el navegador soporta compartir archivos
            if (navigator.canShare && navigator.canShare({ files: archivosParaCompartir })) {
                datosACompartir.files = archivosParaCompartir;
            }

            try {
                await navigator.share(datosACompartir);
            } catch (error) {
                console.log("El usuario canceló o hubo un error al compartir:", error);
            } finally {
                // Restaurar texto del botón (recargando para que recupere el ícono SVG si es el de pánico)
                if(esPanico) {
                    event.target.innerHTML = `
                        <svg class="bell-icon" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
                            <path d="M224 0c-17.7 0-32 14.3-32 32V51.2C119 66 64 130.6 64 208v114.3c0 45.3-17.9 88.9-50 120.9-5.7 5.7-9 13.5-9 21.6 0 17 13.8 30.7 30.7 30.7H412.3c17 0 30.7-13.8 30.7-30.7 0-8.1-3.2-15.9-9-21.6C401.9 411.2 384 367.6 384 322.3V208c0-77.4-55-142-128-156.8V32c0-17.7-14.3-32-32-32zm0 512c26.5 0 48-21.5 48-48H176c0 26.5 21.5 48 48 48z"/>
                        </svg>
                        Solo si te sientes en peligro presiona este botón
                    `;
                } else {
                    event.target.innerText = "Compartir ubicación en tiempo real";
                }
            }
        }, (error) => {
            alert("Para usar esta función, debes permitir el acceso a tu ubicación.");
            if(esPanico) {
                    event.target.innerHTML = `
                        <svg class="bell-icon" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
                            <path d="M224 0c-17.7 0-32 14.3-32 32V51.2C119 66 64 130.6 64 208v114.3c0 45.3-17.9 88.9-50 120.9-5.7 5.7-9 13.5-9 21.6 0 17 13.8 30.7 30.7 30.7H412.3c17 0 30.7-13.8 30.7-30.7 0-8.1-3.2-15.9-9-21.6C401.9 411.2 384 367.6 384 322.3V208c0-77.4-55-142-128-156.8V32c0-17.7-14.3-32-32-32zm0 512c26.5 0 48-21.5 48-48H176c0 26.5 21.5 48 48 48z"/>
                        </svg>
                        Solo si te sientes en peligro presiona este botón
                    `;
                } else {
                    event.target.innerText = "Compartir ubicación en tiempo real";
                }
        }, { enableHighAccuracy: true });
    }
</script>

</body>
</html>
